rules:
  - id: yams.cpp.result-value-without-guard
    languages: [cpp]
    severity: WARNING
    message: >-
      Result-like value accessed with .value(). Ensure this path is guarded by a success check; prefer
      explicit propagation or REQUIRE/CHECK only in tests.
    metadata:
      category: correctness
      cwe: "CWE-252"
      confidence: low
      precision: low
      yams_triage: result-handling
    patterns:
      - pattern: $R.value()
      - pattern-not-inside: |
          if ($R) {
            ...
          }
      - pattern-not-inside: |
          REQUIRE($R);
          ...
      - pattern-not-inside: |
          REQUIRE($R.has_value());
          ...
      - pattern-not-inside: |
          CHECK($R);
          ...
