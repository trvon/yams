site_name: YAMS
site_description: Yet Another Memory System — persistent memory for LLMs and applications.
site_url: https://trvon.github.io/yams
repo_url: https://sr.ht/~trvon/yams/
repo_name: sr.ht/~trvon/yams
docs_dir: docs
site_dir: site
use_directory_urls: true

# Exclude internal planning/working docs from site build.
exclude_docs: |
  delivery/**
  pbi/**
  testing/CATCH2_PATTERNS.md
  testing/embedding_dimension_robustness.md
  hosting/p0-object-storage-s3-validation.md
  design/monolith_refactor_program_codex_yams.md
  benchmarks/retrieval_precision_optimization.md
  benchmarks/multi_client_optimization_loop.md

nav:
  - Home: index.md
  - Get Started:
      - Installation: user_guide/installation.md
      - Quick Start: user_guide/README.md
      - CLI Reference: user_guide/cli.md
      - MCP Server: user_guide/mcp.md
      - Tutorials: user_guide/tutorials/README.md
  - Guides:
      - Embeddings & Search: user_guide/embeddings.md
      - Self-hosting: hosting/self_hosting.md
      - Operations: admin/operations.md
      - Plugins: PLUGINS.md
      - Prompt Templates: PROMPT.md
  - API:
      - Overview: api/README.md
      - MCP Tools: api/mcp_tools.md
  - Hosting:
      - Managed Hosting: hosting/managed.md
      - Pricing (Preview): hosting/pricing.md
      - Services: services/README.md
      - Support Plans: services/support_plans.md
      - Contact: services/contact.md
  - Reference:
      - Architecture:
          - Daemon & Services: architecture/daemon_architecture.md
          - Plugins & Extraction: architecture/plugin_architecture.md
      - Benchmarks:
          - Overview: benchmarks/README.md
          - Performance Report: benchmarks/performance_report.md
          - Storage Backends: benchmarks/storage_backends.md
      - Developer:
          - Setup: developer/setup.md
          - Build System: developer/build_system.md
          - Contributing: developer/contributing.md
          - Mobile Bindings: developer/mobile-bindings.md
      - Roadmap: roadmap.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.top
    - content.code.copy
  palette:
    scheme: slate
  language: en
  font:
    text: "JetBrains Mono"
    code: "JetBrains Mono"
  logo: assets/yams.png
  favicon: assets/yams.png

markdown_extensions:
  - admonition
  - attr_list
  - codehilite
  - toc:
      permalink: true
  - footnotes
  - meta
  - sane_lists
  - smarty
  - tables
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences

plugins:
  - search

extra:
  social:
    - icon: simple/sourcehut
      link: https://sr.ht/~trvon/yams/
      name: SourceHut
    - icon: fontawesome/brands/github
      link: https://github.com/trvon/yams
      name: GitHub (mirror)
    - icon: fontawesome/solid/envelope
      link: mailto:support@yamsmemory.ai
      name: Email
  announcement: '<a href="https://trvon.github.io/yams/hosting/managed/">Join Hosting Early Access →</a>'

extra_css:
  - assets/retro.css
  - assets/landing.css
extra_javascript:
  - assets/landing.js
copyright: "© YAMS"
